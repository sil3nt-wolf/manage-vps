<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#08090d"/>
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e5cff"/>
      <stop offset="100%" stop-color="#0ff4c6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <line x1="14" y1="12" x2="50" y2="52" stroke="url(#lg)" stroke-width="7" stroke-linecap="round"/>
    <line x1="50" y1="12" x2="14" y2="52" stroke="url(#lg)" stroke-width="7" stroke-linecap="round"/>
  </g>
  <circle cx="32" cy="32" r="3.5" fill="#0ff4c6" opacity="0.8"/>
</svg>
