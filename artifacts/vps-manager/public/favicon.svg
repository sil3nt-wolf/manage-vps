<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="64" height="64" rx="8" fill="#000000"/>

  <!-- Green border -->
  <rect width="64" height="64" rx="8" fill="none" stroke="#00ff00" stroke-width="2" opacity="0.6"/>

  <!-- Corner accent dots -->
  <rect x="4" y="4" width="3" height="3" fill="#00ff00" opacity="0.8"/>
  <rect x="57" y="4" width="3" height="3" fill="#00ff00" opacity="0.8"/>
  <rect x="4" y="57" width="3" height="3" fill="#00ff00" opacity="0.8"/>
  <rect x="57" y="57" width="3" height="3" fill="#00ff00" opacity="0.8"/>

  <!-- Big W letterform — bold angular wolf-tech style -->
  <g filter="url(#glow)">
    <!-- Left leg down -->
    <line x1="10" y1="16" x2="18" y2="44" stroke="#00ff00" stroke-width="5.5" stroke-linecap="square"/>
    <!-- Left V bottom -->
    <line x1="18" y1="44" x2="27" y2="26" stroke="#00ff00" stroke-width="5.5" stroke-linecap="square"/>
    <!-- Right V bottom -->
    <line x1="27" y1="26" x2="36" y2="44" stroke="#00ff00" stroke-width="5.5" stroke-linecap="square"/>
    <!-- Right leg up -->
    <line x1="36" y1="44" x2="44" y2="16" stroke="#00ff00" stroke-width="5.5" stroke-linecap="square"/>
  </g>

  <!-- Horizontal underline bar -->
  <rect x="9" y="51" width="46" height="2" fill="#00ff00" opacity="0.45" filter="url(#softglow)"/>

  <!-- Small T to the right, subtle -->
  <g opacity="0.55" filter="url(#softglow)">
    <line x1="50" y1="16" x2="60" y2="16" stroke="#00ff00" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="55" y1="16" x2="55" y2="44" stroke="#00ff00" stroke-width="2.5" stroke-linecap="square"/>
  </g>
</svg>
